<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pembayaran | Photobox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
       
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #ffd166 100%);
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Groovy blobs */
        .blob-1 {
            position: absolute;
            top: -50px;
            left: -80px;
            width: 350px;
            height: 350px;
            background: #ffd166;
            border-radius: 60% 40% 70% 30% / 40% 50% 50% 60%;
            filter: blur(80px);
            opacity: 0.7;
            z-index: 0;
        }

        .blob-2 {
            position: absolute;
            bottom: -80px;
            right: -60px;
            width: 400px;
            height: 400px;
            background: #ef476f;
            border-radius: 70% 30% 60% 40% / 50% 40% 60% 50%;
            filter: blur(90px);
            opacity: 0.6;
            z-index: 0;
        }

        .blob-3 {
            position: absolute;
            top: 40%;
            left: 20%;
            width: 250px;
            height: 250px;
            background: #06d6a0;
            border-radius: 50% 50% 30% 70% / 60% 40% 60% 40%;
            filter: blur(70px);
            opacity: 0.4;
            z-index: 0;
        }

        /* Stiker bergerak */
        .sticker {
            position: absolute;
            z-index: 2;
            font-size: 40px;
            animation: floatGroovy 4s ease-in-out infinite;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.2));
        }

        @keyframes floatGroovy {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .sticker-1 { top: 10%; left: 5%; animation-delay: 0s; }
        .sticker-2 { top: 15%; right: 8%; animation-delay: 0.5s; }
        .sticker-3 { bottom: 15%; left: 8%; animation-delay: 1s; }
        .sticker-4 { bottom: 20%; right: 10%; animation-delay: 0.3s; }
        .sticker-5 { top: 45%; left: 3%; animation-delay: 0.8s; }

        /* Container - DI TENGAH */
        .container {
            position: relative;
            z-index: 3;
            max-width: 450px;
            width: 90%;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 30px 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            /* CENTER */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-height: 95vh;
            overflow-y: auto;
        }

        /* Hilangkan scrollbar di container */
        .container::-webkit-scrollbar {
            display: none;
        }

        h2 {
            font-size: 28px;
            font-weight: 900;
            color: #f7931e;
            text-shadow: 2px 2px 0 #ffd166;
            margin-bottom: 6px;
        }

        .sub {
            color: #666;
            margin-bottom: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        /* QRIS Card */
        .qris-card {
            background: white;
            border-radius: 35px;
            padding: 20px;
            margin: 10px 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid rgba(255,107,53,0.2);
        }

        .qris-img {
            background: #fff;
            padding: 12px;
            border-radius: 25px;
            display: inline-block;
            margin: 8px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .qris-img img {
            width: 180px;
            height: auto;
        }

        .price {
            font-size: 28px;
            font-weight: 900;
            color: #ef476f;
            margin: 12px 0;
            text-shadow: 1px 1px 0 #ffd166;
        }

        .price small {
            font-size: 13px;
            font-weight: normal;
            color: #888;
        }

        /* Tombol Groovy */
        .btn-payment {
            background: #06d6a0;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            box-shadow: 0 6px 0 #048a61;
            font-family: inherit;
            margin-top: 12px;
        }

        .btn-payment:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #048a61;
        }

        .btn-back {
            background: #ff6b35;
            box-shadow: 0 6px 0 #c44d1e;
            margin-top: 8px;
        }

        .btn-back:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #c44d1e;
        }

        /* Info note */
        .info-note {
            margin-top: 15px;
            font-size: 10px;
            color: #888;
            background: rgba(255,107,53,0.1);
            padding: 8px;
            border-radius: 25px;
        }

        .info-note i {
            font-style: normal;
            display: inline-block;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #ffd166;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading p {
            color: white;
            margin-top: 12px;
            font-size: 13px;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .container { padding: 20px 18px; width: 95%; }
            h2 { font-size: 24px; }
            .qris-img img { width: 150px; }
            .price { font-size: 24px; }
            .btn-payment { padding: 12px; font-size: 14px; }
            .sticker { font-size: 28px; }
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

    <!-- Blobs abstrak -->
    <div class="blob-1"></div>
    <div class="blob-2"></div>
    <div class="blob-3"></div>


    <div class="container">
        <h2> Pembayaran</h2>
        <div class="sub">Scan QRIS untuk memulai sesi foto</div>

        <div class="qris-card">
            <div class="qris-img">
                <img id="qrisImage" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=QRIS|PHOTOBOX|20000" alt="QRIS Code">
            </div>
            <div class="price">Rp 35.000 <small>/ sesi</small></div>
            <p style="font-size: 12px; color: #666;">Scan pakai Gopay, OVO, DANA, ShopeePay, atau QRIS lain</p>
        </div>

        <button class="btn-payment" onclick="confirmPayment()">SUDAH BAYAR</button>
        <button class="btn-payment btn-back" onclick="window.location.href='/select-frame.html'">KEMBALI KE FRAME</button>
        
        <div class="info-note">
            <i>Setelah scan & bayar, klik tombol di atas untuk masuk sesi foto</i>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Memproses pembayaran...</p>
    </div>

    <script>
        let currentSessionId = null;

        function confirmPayment() {
            showLoading();
            
            $.ajax({
                url: '/api/start-session',
                method: 'POST',
                success: function(response) {
                    currentSessionId = response.sessionId;
                    localStorage.setItem('sessionId', currentSessionId);
                    localStorage.setItem('sessionStartTime', Date.now());
                    localStorage.setItem('sessionDuration', 480);
                    
                    $.ajax({
                        url: '/api/confirm-payment/' + currentSessionId,
                        method: 'POST',
                        success: function() {
                            window.location.href = '/camera.html';
                        },
                        error: function() {
                            hideLoading();
                            alert("Gagal konfirmasi pembayaran, coba lagi.");
                        }
                    });
                },
                error: function() {
                    hideLoading();
                    alert("Gagal memulai sesi, coba lagi.");
                }
            });
        }

        function showLoading() {
            $('#loading').fadeIn(200);
        }

        function hideLoading() {
            $('#loading').fadeOut(200);
        }
    </script>
</body>
</html>
