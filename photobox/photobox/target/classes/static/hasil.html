<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Selesai | Photobox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #ffd166 100%);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 20px;
            position: relative;
        }

        /* Groovy blobs */
        .blob-1 {
            position: absolute;
            top: -50px;
            left: -80px;
            width: 350px;
            height: 350px;
            background: #ffd166;
            border-radius: 60% 40% 70% 30% / 40% 50% 50% 60%;
            filter: blur(80px);
            opacity: 0.7;
            z-index: 0;
        }

        .blob-2 {
            position: absolute;
            bottom: -80px;
            right: -60px;
            width: 400px;
            height: 400px;
            background: #ef476f;
            border-radius: 70% 30% 60% 40% / 50% 40% 60% 50%;
            filter: blur(90px);
            opacity: 0.6;
            z-index: 0;
        }

        .blob-3 {
            position: absolute;
            top: 40%;
            left: 20%;
            width: 250px;
            height: 250px;
            background: #06d6a0;
            border-radius: 50% 50% 30% 70% / 60% 40% 60% 40%;
            filter: blur(70px);
            opacity: 0.4;
            z-index: 0;
        }

        /* Stiker bergerak */
        .sticker {
            position: absolute;
            z-index: 2;
            font-size: 35px;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.2));
        }

        @keyframes float {
            0%,100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .sticker-1 { top: 10%; left: 5%; animation-delay: 0s; }
        .sticker-2 { top: 15%; right: 8%; animation-delay: 0.5s; }
        .sticker-3 { bottom: 12%; left: 8%; animation-delay: 1s; }
        .sticker-4 { bottom: 18%; right: 10%; animation-delay: 0.3s; }

        /* ========== 3 CONTAINER TERPISAH ========== */
        .container-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 100px;   /* Jarak lebih jauh */
            flex-wrap: wrap;
            z-index: 3;
            position: relative;
            width: 100%;
            max-width: 2000px;
            margin: 0 auto;
        }

        /* Container 1: Hasil Foto */
        .container-result {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            width: 300px;
        }

        /* Container 2: GIF (diperbesar) */
        .container-gif {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            width: 340px;
        }

        
        .container-qr {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 65px 60px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            width: 500px;
        }

        
        .container-title {
            font-size: 16px;
            font-weight: bold;
            color: #f7931e;
            margin-bottom: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Hasil Foto */
        .result-photo img {
            width: 100%;
            max-width: 260px;
            height: auto;
            border-radius: 15px;
            display: block;
            margin: 0 auto;
        }

        /* GIF (canvas lebih besar) */
        .gif-container canvas {
            width: 100%;
            max-width: 280px;
            height: auto;
            border-radius: 15px;
            display: block;
            margin: 0 auto;
            background: #f0f0f0;
        }

        .gif-note {
            font-size: 10px;
            color: #999;
            margin-top: 10px;
        }

        /* QR (gambar lebih besar) */
        .qr-container img {
            width: 180px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .qr-note {
            font-size: 11px;
            color: #666;
            margin-top: 10px;
        }

        /* Tombol Aksi di bawah */
        .action-buttons {
            position: relative;
            z-index: 3;
            text-align: center;
            margin-top: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            background: #06d6a0;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 14px;
            padding: 12px 30px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 4px 0 #048a61;
            transition: 0.1s;
            font-family: inherit;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #048a61;
        }

        .btn-home {
            background: #ff6b35;
            box-shadow: 0 4px 0 #c44d1e;
        }

        .info-text {
            font-size: 11px;
            color: #888;
            margin-top: 20px;
            text-align: center;
        }

        /* Responsive */
        @media (max-width: 1000px) {
            .container-wrapper { gap: 30px; }
            .container-result, .container-qr { width: 280px; }
            .container-gif { width: 310px; }
            .result-photo img { max-width: 220px; }
            .gif-container canvas { max-width: 250px; }
            .qr-container img { width: 150px; }
        }

        @media (max-width: 850px) {
            .container-wrapper { flex-direction: column; gap: 25px; }
            .container-result, .container-gif, .container-qr { width: 320px; }
            .result-photo img { max-width: 260px; }
            .gif-container canvas { max-width: 280px; }
            .qr-container img { width: 160px; }
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="blob-1"></div>
    <div class="blob-2"></div>
    <div class="blob-3"></div>

    <div class="sticker sticker-1">📸</div>
    <div class="sticker sticker-2">🎨</div>
    <div class="sticker sticker-3">🖼️</div>
    <div class="sticker sticker-4">✨</div>

    <!-- 3 CONTAINER TERPISAH -->
    <div class="container-wrapper">
        <!-- CONTAINER 1: Hasil Foto -->
        <div class="container-result">
            <div class="container-title">HASIL FOTO</div>
            <div class="result-photo">
                <img id="resultImage" alt="Hasil Foto Strip">
            </div>
        </div>

        <!-- CONTAINER 2: GIF Animasi (diperbesar) -->
        <div class="container-gif">
            <div class="container-title">GIF ANIMASI</div>
            <div class="gif-container">
                <canvas id="gifCanvas"></canvas>
                <div class="gif-note">Foto 1 → Foto 2 → Foto 3 (berulang)</div>
            </div>
        </div>

        <!-- CONTAINER 3: QR Code (diperbesar) -->
        <div class="container-qr">
            <div class="container-title">SCAN QR CODE</div>
            <div class="qr-container">
                <img id="qrCodeImg" alt="QR Code">
                <div class="qr-note">Scan untuk download foto</div>
            </div>
        </div>
    </div>

    <!-- Tombol Aksi -->
    <div class="action-buttons">
        <button class="btn" onclick="downloadPhoto()">Download Foto</button>
        <button class="btn btn-home" onclick="window.location.href='/'"> Kembali ke Home</button>
    </div>
    <div class="info-text">
        
    </div>

    <script>
        let finalImageData = null;
        let downloadUrl = null;
        let animationInterval = null;
        let capturedPhotosGIF = [];

        // Fungsi untuk membuat GIF sederhana (3 foto bergantian)
        async function createSimpleGIF(photos, interval = 1200) {
            return new Promise((resolve) => {
                const canvas = document.getElementById('gifCanvas');
                const ctx = canvas.getContext('2d');
                
                if (!photos || photos.length === 0) {
                    resolve();
                    return;
                }
                
                const img = new Image();
                img.src = photos[0];
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    let frame = 0;
                    
                    if (animationInterval) clearInterval(animationInterval);
                    
                    // Tampilkan foto pertama
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // Setiap interval, ganti foto
                    animationInterval = setInterval(() => {
                        frame = (frame + 1) % photos.length;
                        const nextImg = new Image();
                        nextImg.src = photos[frame];
                        nextImg.onload = () => {
                            ctx.drawImage(nextImg, 0, 0, canvas.width, canvas.height);
                        };
                    }, interval);
                    
                    resolve();
                };
            });
        }

        // Halaman hasil
        async function initResult() {
            // Ambil data dari localStorage
            const qrCode = localStorage.getItem('qrCode');
            const downloadUrlSaved = localStorage.getItem('downloadUrl');
            const finalImage = localStorage.getItem('finalImage');
            const photosGIF = localStorage.getItem('capturedPhotosGIF');
            
            if (qrCode) {
                document.getElementById('qrCodeImg').src = qrCode;
            }
            
            if (finalImage) {
                finalImageData = finalImage;
                document.getElementById('resultImage').src = finalImage;
                downloadUrl = downloadUrlSaved;
            }
            
            // Ambil 3 foto untuk GIF
            if (photosGIF) {
                capturedPhotosGIF = JSON.parse(photosGIF);
                if (capturedPhotosGIF.length === 3) {
                    await createSimpleGIF(capturedPhotosGIF, 1200);
                }
            } else if (finalImage) {
                await createSimpleGIF([finalImage, finalImage, finalImage], 1200);
            }
        }

        function downloadPhoto() {
            if (downloadUrl) {
                window.open(downloadUrl, '_blank');
            } else if (finalImageData) {
                const link = document.createElement('a');
                link.download = 'photobox-strip.jpg';
                link.href = finalImageData;
                link.click();
            } else {
                alert("Gagal download foto");
            }
        }

        // Cleanup interval saat halaman ditutup
        window.addEventListener('beforeunload', function() {
            if (animationInterval) {
                clearInterval(animationInterval);
            }
        });

        initResult();
    </script>
</body>
</html>
