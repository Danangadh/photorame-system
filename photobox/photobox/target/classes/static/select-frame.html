<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pilih Frame | Photobox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

       
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #ffd166 100%);
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Groovy blobs */
        .blob-1 {
            position: absolute;
            top: -50px;
            left: -80px;
            width: 350px;
            height: 350px;
            background: #ffd166;
            border-radius: 60% 40% 70% 30% / 40% 50% 50% 60%;
            filter: blur(80px);
            opacity: 0.7;
            z-index: 0;
        }

        .blob-2 {
            position: absolute;
            bottom: -80px;
            right: -60px;
            width: 400px;
            height: 400px;
            background: #ef476f;
            border-radius: 70% 30% 60% 40% / 50% 40% 60% 50%;
            filter: blur(90px);
            opacity: 0.6;
            z-index: 0;
        }

        .blob-3 {
            position: absolute;
            top: 40%;
            left: 20%;
            width: 250px;
            height: 250px;
            background: #06d6a0;
            border-radius: 50% 50% 30% 70% / 60% 40% 60% 40%;
            filter: blur(70px);
            opacity: 0.4;
            z-index: 0;
        }

        /* Stiker bergerak */
        .sticker {
            position: absolute;
            z-index: 2;
            font-size: 40px;
            animation: floatGroovy 4s ease-in-out infinite;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.2));
        }

        @keyframes floatGroovy {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .sticker-1 { top: 10%; left: 3%; animation-delay: 0s; }
        .sticker-2 { top: 15%; right: 5%; animation-delay: 0.5s; }
        .sticker-3 { bottom: 12%; left: 5%; animation-delay: 1s; }
        .sticker-4 { bottom: 18%; right: 8%; animation-delay: 0.3s; }
        .sticker-5 { top: 40%; left: 2%; animation-delay: 0.8s; }

        /* Container - DI TENGAH / CENTER */
        .container {
            position: relative;
            z-index: 3;
            max-width: 950px;
            width: 90%;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            max-height: 90vh;
            overflow-y: auto;
            /* CENTER */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Hilangkan scrollbar di container */
        .container::-webkit-scrollbar {
            display: none;
        }

        h2 {
            font-size: 50px;
            font-weight: 900;
            color: #f7931e;
            text-shadow: 2px 2px 0 #f71f1f;
            margin-bottom: 8px;
        }

        .sub {
            color: #666;
            margin-bottom: 25px;
            font-size: 13px;
            font-weight: 500;
        }

        /* GRID FRAME */
        .frames-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 18px;
            margin-bottom: 25px;
            justify-items: center;
            align-items: center;
        }

        /* CARD FRAME GROOVY */
        .frame-card {
            background: #fff;
            border-radius: 25px;
            padding: 12px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 160px;
        }

        .frame-card:hover {
            transform: translateY(-5px) rotate(1deg);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }

        .frame-card.selected {
            border-color: #06d6a0;
            background: linear-gradient(145deg, #fff8f0, #fff);
            box-shadow: 0 0 0 3px rgba(6,214,160,0.3);
        }

        .frame-card img {
            width: 100%;
            max-width: 120px;
            height: auto;
            border-radius: 18px;
            margin-bottom: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .frame-name {
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin: 6px 0 3px;
        }

        .frame-desc {
            font-size: 10px;
            color: #f7931e;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .checkmark {
            width: 22px;
            height: 22px;
            background: #06d6a0;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 4px;
            color: white;
            font-size: 12px;
            opacity: 0;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .frame-card.selected .checkmark {
            opacity: 1;
        }

        /* TOMBOL GROOVY */
        .btn-next {
            background: #06d6a0;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            box-shadow: 0 6px 0 #048a61;
            font-family: inherit;
        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 6px 0 #048a61;
        }

        .btn-next:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #048a61;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #ffd166;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 18px; width: 95%; }
            h2 { font-size: 26px; }
            .frames-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }
            .frame-card { padding: 8px 6px; max-width: 130px; }
            .frame-card img { max-width: 100px; }
            .frame-name { font-size: 11px; }
            .btn-next { padding: 10px; font-size: 14px; }
            .sticker { font-size: 28px; }
        }
    </style>
</head>
<body>

    <!-- Blobs abstrak -->
    <div class="blob-1"></div>
    <div class="blob-2"></div>
    <div class="blob-3"></div>

    <!-- Stiker bergerak -->
    <div class="sticker sticker-1">📸</div>
    <div class="sticker sticker-2">🎨</div>
    <div class="sticker sticker-3">🖼️</div>
    <div class="sticker sticker-4">✨</div>
    <div class="sticker sticker-5">🌈</div>

    <div class="container">
        <h2> Pilih Frame Lucu Yuk!</h2>
        <div class="sub">Klik frame favoritmu untuk mulai foto strip</div>
        
        <div class="frames-grid" id="framesGrid"></div>
        
        <button class="btn-next" id="nextBtn" disabled onclick="goToPayment()"> LANJUTKAN KE PEMBAYARAN</button>
    </div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <script>
        let selectedFrameId = null;
        let selectedPhotoCount = 3;
        let selectedFrameImage = null;
        let frames = JSON.parse(localStorage.getItem('frameTemplates')) || [];

        function loadFrames() {
            const grid = document.getElementById('framesGrid');
            
            if (!frames.length) {
                grid.innerHTML = '<p style="color:#888; text-align:center; padding:40px; font-size:14px;">✨ Belum ada frame. Admin harus upload dulu! ✨</p>';
                return;
            }
            
            grid.innerHTML = '';
            frames.forEach(frame => {
                const card = document.createElement('div');
                card.className = 'frame-card';
                card.innerHTML = `
                    <img src="${frame.frameImage}" alt="${frame.name}">
                    <div class="frame-name">${frame.name}</div>
                    <div class="frame-desc"> ${frame.photoCount} foto</div>
                    <div class="checkmark">✓</div>
                `;
                card.onclick = () => {
                    document.querySelectorAll('.frame-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    
                    selectedFrameId = frame.id;
                    selectedPhotoCount = frame.photoCount;
                    selectedFrameImage = frame.frameImage;
                    
                    localStorage.setItem('selectedFrameId', selectedFrameId);
                    localStorage.setItem('photoCount', selectedPhotoCount);
                    localStorage.setItem('frameImage', selectedFrameImage);
                    
                    document.getElementById('nextBtn').disabled = false;
                };
                grid.appendChild(card);
            });
        }

        function goToPayment() {
            if (!selectedFrameId) {
                alert("Pilih frame dulu ya!");
                return;
            }
            window.location.href = '/payment.html';
        }

        loadFrames();
    </script>
</body>
</html>
