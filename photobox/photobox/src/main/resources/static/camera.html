<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Strip Foto | Photobox</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #ffd166 100%);
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .blob-1, .blob-2, .blob-3 {
            position: absolute;
            filter: blur(80px);
            opacity: 0.5;
            z-index: 0;
        }
        .blob-1 { width: 300px; height: 300px; background: #ffd166; top: -50px; left: -80px; border-radius: 60% 40% 70% 30%; }
        .blob-2 { width: 350px; height: 350px; background: #ef476f; bottom: -80px; right: -60px; border-radius: 70% 30% 60% 40%; }
        .blob-3 { width: 200px; height: 200px; background: #06d6a0; top: 40%; left: 20%; border-radius: 50% 50% 30% 70%; }

        .sticker {
            position: absolute; font-size: 35px; animation: float 4s infinite; z-index: 2;
        }
        @keyframes float {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .sticker-1 { top: 8%; left: 5%; }
        .sticker-2 { top: 12%; right: 8%; animation-delay: 0.5s; }
        .sticker-3 { bottom: 10%; left: 5%; animation-delay: 1s; }
        .sticker-4 { bottom: 15%; right: 10%; animation-delay: 0.3s; }
        
        /* MAIN LAYOUT - KIRI KANAN */
        .main-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 3;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
        }
        
        /* BAGIAN KIRI - Sesi Foto */
        .left-panel {
            flex: 1;
            min-width: 280px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.4);
        }
        
        /* BAGIAN KANAN - Hasil Preview */
        .right-panel {
            flex: 1;
            min-width: 280px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.4);
        }
        
        .right-panel h3 {
            font-size: 14px;
            color: #f7931e;
            margin-bottom: 10px;
        }
        
        .preview-wrapper {
            background: #fff;
            border-radius: 20px;
            padding: 6px;
            margin-bottom: 8px;
        }
        
        #previewCanvas {
            width: 100%;
            max-width: 250px;
            height: auto;
            border-radius: 14px;
            background: #f0f0f0;
            display: block;
            margin: 0 auto;
        }
        
        .timer {
            background: #1e1e2f;
            color: #ffd166;
            font-size: 24px;
            font-weight: bold;
            font-family: monospace;
            padding: 6px;
            border-radius: 50px;
            margin-bottom: 12px;
            border: 2px solid #ff6b35;
            box-shadow: 0 4px 0 #c44d1e;
        }
        
        .frame-wrapper {
            background: #fff;
            border-radius: 20px;
            padding: 6px;
            margin-bottom: 8px;
        }
        
        #frameCanvas {
            width: 100%;
            max-width: 250px;
            height: auto;
            border-radius: 14px;
            display: block;
            margin: 0 auto;
        }
        
        .info-slot {
            margin: 8px auto;
            font-size: 11px;
            background: rgba(6,214,160,0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            color: #06d6a0;
            font-weight: bold;
            border: 1px solid #06d6a0;
        }
        
        .action-buttons {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            background: #06d6a0;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 13px;
            padding: 10px 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #048a61;
            transition: 0.1s;
            font-family: inherit;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #048a61; }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-reset { background: #ef476f; box-shadow: 0 4px 0 #a0224a; }
        .btn-cetak { background: #ff6b35; box-shadow: 0 4px 0 #c44d1e; }
        
        .loading {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center;
            align-items: center; z-index: 1000; flex-direction: column;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #ffd166;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-msg {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #1e1e2f; color: #ffd166; padding: 6px 15px;
            border-radius: 40px; z-index: 1100; display: none; font-size: 11px;
            border: 1px solid #ff6b35;
        }
        
        @media (max-width: 700px) {
            .main-layout { flex-direction: column; align-items: center; }
            .left-panel, .right-panel { width: 100%; max-width: 350px; }
        }
    </style>
</head>
<body>
    <div class="blob-1"></div><div class="blob-2"></div><div class="blob-3"></div>
    <div class="sticker sticker-1">📸</div><div class="sticker sticker-2">🎨</div>
    <div class="sticker sticker-3">🖼️</div><div class="sticker sticker-4">✨</div>

    <div class="main-layout">
        <!-- KIRI: Sesi Foto -->
        <div class="left-panel">
            <div class="timer" id="timer">08:00</div>
            <div class="frame-wrapper">
                <canvas id="frameCanvas" width="250" height="750" style="width:100%; height:auto;"></canvas>
            </div>
            <div class="info-slot" id="slotInfo">Slot 1 dari 3 • Siap foto</div>
            <div class="action-buttons">
                <button id="captureBtn">AMBIL FOTO</button>
                <button id="resetBtn" class="btn-reset" style="display:none;">ULANG</button>
                <button id="cetakBtn" class="btn-cetak" style="display:none;">CETAK</button>
            </div>
        </div>
        
        <!-- KANAN: Preview Hasil -->
        <div class="right-panel">
            <h3> PREVIEW HASIL </h3>
            <div class="preview-wrapper">
                <canvas id="previewCanvas" width="250" height="750" style="width:100%; height:auto;"></canvas>
            </div>
            <p style="font-size: 10px; color: #888; margin-top: 8px;">Hasil akhir akan muncul di sini</p>
        </div>
    </div>

    <div class="loading" id="loadingOverlay"><div class="spinner"></div><p>Memproses...</p></div>
    <div class="toast-msg" id="toastMsg"></div>

    <script>
        let stream = null;
        let videoElement = null;
        let sessionId = localStorage.getItem('sessionId');
        let sessionEnd = null;
        let timerInterval = null;

        let totalSlots = 3;
        let currentSlot = 0;
        let capturedPhotos = [null, null, null];
        let isWaiting = false;
        let countdownValue = 0;
        let frameImg = new Image();
        let frameNaturalWidth = 250, frameNaturalHeight = 750;
        let slotPositions = [];

        const canvas = document.getElementById('frameCanvas');
        const ctx = canvas.getContext('2d');
        const previewCanvas = document.getElementById('previewCanvas');
        const previewCtx = previewCanvas.getContext('2d');

        async function init() {
            const frameId = localStorage.getItem('selectedFrameId');
            const allFrames = JSON.parse(localStorage.getItem('frameTemplates')) || [];
            const currentFrame = allFrames.find(f => f.id == frameId);
            
            if (!currentFrame || !currentFrame.frameImage) {
                alert("✨ Frame tidak ditemukan! Silakan pilih frame di halaman sebelumnya.");
                window.location.href = '/select-frame.html';
                return;
            }
            
            frameImg.src = currentFrame.frameImage;
            await new Promise((resolve) => { frameImg.onload = resolve; });
            
            frameNaturalWidth = frameImg.width;
            frameNaturalHeight = frameImg.height;
            canvas.width = frameNaturalWidth;
            canvas.height = frameNaturalHeight;
            previewCanvas.width = frameNaturalWidth;
            previewCanvas.height = frameNaturalHeight;
            
            if (currentFrame.slotPositions && currentFrame.slotPositions.length === 3) {
                slotPositions = currentFrame.slotPositions;
            } else {
                const slotHeight = frameNaturalHeight / 3;
                const margin = 8;
                for (let i = 0; i < 3; i++) {
                    slotPositions.push({
                        x: margin,
                        y: i * slotHeight + margin,
                        w: frameNaturalWidth - margin * 2,
                        h: slotHeight - margin * 2
                    });
                }
            }
            
            const startTime = localStorage.getItem('sessionStartTime');
            const duration = localStorage.getItem('sessionDuration');
            if (startTime && duration) {
                sessionEnd = parseInt(startTime) + (parseInt(duration) * 1000);
                startTimer();
            } else {
                alert("Sesi tidak valid.");
                window.location.href = '/';
            }
            
            await setupCamera();
            startDrawLoop();
            updateSlotInfo();
            updatePreview();
        }

        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                const remaining = sessionEnd - Date.now();
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer').innerText = "00:00";
                    alert("Waktu sesi habis!");
                    window.location.href = '/';
                } else {
                    const minutes = Math.floor(remaining / 60000);
                    const seconds = Math.floor((remaining % 60000) / 1000);
                    document.getElementById('timer').innerText = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
                }
            }, 1000);
        }
        
        function updateTimerDisplay() {
            const remaining = sessionEnd - Date.now();
            if (remaining > 0) {
                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                document.getElementById('timer').innerText = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            }
        }

        async function setupCamera() {
            try {
                if (stream) stream.getTracks().forEach(t => t.stop());
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                videoElement = document.createElement('video');
                videoElement.srcObject = stream;
                videoElement.autoplay = true;
                videoElement.playsInline = true;
                await videoElement.play();
            } catch (err) {
                alert("Izin kamera diperlukan.");
            }
        }

        function startDrawLoop() {
            function draw() {
                ctx.clearRect(0, 0, frameNaturalWidth, frameNaturalHeight);
                
                // LAYER 1: 3 kamera terpisah
                for (let i = 0; i < totalSlots; i++) {
                    if (!capturedPhotos[i] && videoElement && videoElement.readyState >= 2) {
                        const slot = slotPositions[i];
                        if (slot) {
                            ctx.save();
                            ctx.beginPath();
                            ctx.rect(slot.x, slot.y, slot.w, slot.h);
                            ctx.clip();
                            const scale = Math.max(slot.w / videoElement.videoWidth, slot.h / videoElement.videoHeight);
                            const dx = slot.x + (slot.w - videoElement.videoWidth * scale) / 2;
                            const dy = slot.y + (slot.h - videoElement.videoHeight * scale) / 2;
                            ctx.drawImage(videoElement, dx, dy, videoElement.videoWidth * scale, videoElement.videoHeight * scale);
                            ctx.restore();
                        }
                    }
                }
                
                // LAYER 2: Foto capture
                for (let i = 0; i < totalSlots; i++) {
                    if (capturedPhotos[i]) {
                        const slot = slotPositions[i];
                        const img = new Image();
                        img.src = capturedPhotos[i];
                        ctx.drawImage(img, slot.x, slot.y, slot.w, slot.h);
                    }
                }
                
                // LAYER 3: Frame di atas
                ctx.drawImage(frameImg, 0, 0, frameNaturalWidth, frameNaturalHeight);
                
                // Countdown
                if (isWaiting && currentSlot < totalSlots && !capturedPhotos[currentSlot]) {
                    const slot = slotPositions[currentSlot];
                    if (slot && countdownValue > 0) {
                        ctx.fillStyle = "rgba(0,0,0,0.7)";
                        ctx.fillRect(slot.x, slot.y, slot.w, slot.h);
                        ctx.fillStyle = "#ffd166";
                        ctx.font = `bold ${Math.floor(slot.h * 0.5)}px "Poppins"`;
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText(countdownValue, slot.x + slot.w/2, slot.y + slot.h/2);
                    }
                }
                
                // Outline slot aktif
                if (currentSlot < totalSlots && !capturedPhotos[currentSlot]) {
                    const slot = slotPositions[currentSlot];
                    if (slot) {
                        ctx.strokeStyle = "#06d6a0";
                        ctx.lineWidth = 3;
                        ctx.strokeRect(slot.x, slot.y, slot.w, slot.h);
                    }
                }
                
                requestAnimationFrame(draw);
            }
            draw();
        }
        
        function updatePreview() {
            previewCtx.clearRect(0, 0, frameNaturalWidth, frameNaturalHeight);
            
            for (let i = 0; i < totalSlots; i++) {
                if (capturedPhotos[i]) {
                    const slot = slotPositions[i];
                    const img = new Image();
                    img.src = capturedPhotos[i];
                    previewCtx.drawImage(img, slot.x, slot.y, slot.w, slot.h);
                }
            }
            
            previewCtx.drawImage(frameImg, 0, 0, frameNaturalWidth, frameNaturalHeight);
            
            requestAnimationFrame(updatePreview);
        }

        function updateSlotInfo() {
            const el = document.getElementById('slotInfo');
            if (currentSlot >= totalSlots) {
                el.innerText = " Semua foto selesai! Klik CETAK";
            } else {
                el.innerText = `Slot ${currentSlot+1}/${totalSlots} • ${capturedPhotos[currentSlot] ? "Selesai" : "Siap foto"}`;
            }
        }

        async function startCapture() {
            if (!videoElement || videoElement.readyState < 2) { alert("Kamera belum siap."); return; }
            if (capturedPhotos[currentSlot]) { alert("Slot ini sudah terisi!"); return; }
            if (currentSlot >= totalSlots) return;

            isWaiting = true;
            countdownValue = 3;
            
            const countdownInterval = setInterval(() => {
                countdownValue--;
                if (countdownValue <= 0) {
                    clearInterval(countdownInterval);
                }
            }, 1000);

            setTimeout(() => {
                clearInterval(countdownInterval);
                
                const slot = slotPositions[currentSlot];
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = slot.w;
                tempCanvas.height = slot.h;
                const tempCtx = tempCanvas.getContext('2d');
                
                const scale = Math.max(slot.w / videoElement.videoWidth, slot.h / videoElement.videoHeight);
                const dx = (slot.w - videoElement.videoWidth * scale) / 2;
                const dy = (slot.h - videoElement.videoHeight * scale) / 2;
                tempCtx.drawImage(videoElement, dx, dy, videoElement.videoWidth * scale, videoElement.videoHeight * scale);
                const photoData = tempCanvas.toDataURL('image/jpeg', 0.9);
                
                capturedPhotos[currentSlot] = photoData;
                currentSlot++;
                isWaiting = false;
                updateSlotInfo();
                
                if (currentSlot === totalSlots) {
                    document.getElementById('captureBtn').style.display = 'none';
                    document.getElementById('resetBtn').style.display = 'inline-block';
                    document.getElementById('cetakBtn').style.display = 'inline-block';
                    showToast("Semua foto selesai! Klik CETAK.");
                } else {
                    showToast(` Foto ${currentSlot} tersimpan! Lanjut 5 detik`, 1500);
                    setTimeout(() => { autoNextSlot(); }, 5000);
                }
            }, 3500);
        }
        
        function autoNextSlot() {
            if (currentSlot < totalSlots && !capturedPhotos[currentSlot]) {
                startCapture();
            }
        }

        function resetAllPhotos() {
            capturedPhotos = [null, null, null];
            currentSlot = 0;
            isWaiting = false;
            document.getElementById('captureBtn').style.display = 'inline-block';
            document.getElementById('resetBtn').style.display = 'none';
            document.getElementById('cetakBtn').style.display = 'none';
            updateSlotInfo();
            showToast(" Semua foto direset.");
        }

     
        async function printAndGetQR() {
            if (capturedPhotos.includes(null)) {
                alert("Isi semua slot foto dulu!");
                return;
            }
            showLoading(true);
            
        
            localStorage.setItem('capturedPhotosGIF', JSON.stringify(capturedPhotos));
            
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = frameNaturalWidth;
            finalCanvas.height = frameNaturalHeight;
            const fCtx = finalCanvas.getContext('2d');
            
            // Gambar foto
            for (let i = 0; i < totalSlots; i++) {
                const img = new Image();
                img.src = capturedPhotos[i];
                await new Promise(r => { img.onload = r; });
                const slot = slotPositions[i];
                fCtx.drawImage(img, slot.x, slot.y, slot.w, slot.h);
            }
            
            // Gambar frame di atas
            fCtx.drawImage(frameImg, 0, 0, frameNaturalWidth, frameNaturalHeight);
            
            const fullImageBase64 = finalCanvas.toDataURL('image/jpeg', 0.9);
            
            $.ajax({
                url: '/api/capture-photo/' + sessionId,
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ image: fullImageBase64.split(',')[1], filter: 'none' }),
                success: function(resp) {
                    if (resp.status === 'success') {
                        $.ajax({
                            url: '/api/print-and-generate-qr/' + sessionId,
                            method: 'POST',
                            success: function(printRes) {
                                showLoading(false);
                                if (printRes.qrCode) {
                                    // Simpan ke localStorage untuk hasil.html
                                    localStorage.setItem('qrCode', printRes.qrCode);
                                    localStorage.setItem('downloadUrl', printRes.downloadUrl);
                                    localStorage.setItem('finalImage', fullImageBase64);
                                    // Redirect ke halaman hasil
                                    window.location.href = '/hasil.html';
                                } else {
                                    alert("Cetak berhasil! Scan QR.");
                                }
                            },
                            error: () => { showLoading(false); alert("Gagal generate QR."); }
                        });
                    } else { showLoading(false); alert("Gagal menyimpan."); }
                },
                error: () => { showLoading(false); alert("Error."); }
            });
        }

        function showToast(msg, duration=1500) {
            const toast = $('#toastMsg');
            toast.text(msg).fadeIn(150);
            setTimeout(() => toast.fadeOut(150), duration);
        }
        function showLoading(show) { $('#loadingOverlay').css('display', show ? 'flex' : 'none'); }

        document.getElementById('captureBtn').onclick = () => startCapture();
        document.getElementById('resetBtn').onclick = () => resetAllPhotos();
        document.getElementById('cetakBtn').onclick = () => printAndGetQR();

        init();
    </script>
</body>
</html>
